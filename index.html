:root{
  --bg:#eef1f5;--card:#ffffff;--ink:#131820;--mut:#556072;--line:#e4e7ec;--line2:#eef0f4;
  --accent:#2b5aa0;--accent-d:#1e3f70;--accent-l:#eaf1fb;
  --ok:#1a7a48;--ok-bg:#e8f5ee;--ok-l:#93d1ac;
  --due:#9a5a00;--due-bg:#fbf0da;--due-l:#e7bd77;
  --late:#b12a1e;--late-bg:#fbe8e6;--late-l:#e9a49c;
  --pill:#eef0f4;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 2px 6px rgba(16,24,40,.05);
  --shadow-l:0 12px 32px rgba(16,24,40,.15);
  --tone-blue:#2b5aa0;--tone-teal:#0e7c74;--tone-violet:#6b3fa0;--tone-amber:#9a5c12;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
html{overflow-x:clip}
body{font-family:'Cairo',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-variation-settings:'slnt' 0;font-style:normal;background:var(--bg);background-image:linear-gradient(180deg,#e7eef8 0,rgba(238,241,245,0) 260px);color:var(--ink);min-height:100vh;min-height:100dvh;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:clip}
body.ar{direction:rtl;font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;letter-spacing:0}
::selection{background:var(--accent-l)}
#page::-webkit-scrollbar,body::-webkit-scrollbar{width:10px}
body::-webkit-scrollbar-thumb{background:#cfd4dc;border-radius:8px;border:3px solid var(--bg)}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pg.fx{animation:pageIn .26s cubic-bezier(.22,.61,.36,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
:focus{outline:none}
:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:9px}
.tab:focus-visible,.step:focus-visible,.chk:focus-visible,button:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}

/* Header */
.hdr{background:rgba(255,255,255,.9);backdrop-filter:saturate(1.2) blur(10px);-webkit-backdrop-filter:saturate(1.2) blur(10px);border-bottom:1px solid var(--line);padding:11px 15px;padding-top:calc(11px + env(safe-area-inset-top));position:sticky;top:0;z-index:100;box-shadow:0 1px 0 rgba(16,24,40,.02)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;gap:10px;max-width:840px;margin:0 auto}
.hdr-brand{display:flex;align-items:center;gap:10px;min-width:0}
.hdr-mark{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#2b5aa0,#1e3f70);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow)}
.hdr-mark svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.hdr-txt{min-width:0}
.hdr-top h1{font-size:1rem;font-weight:800;letter-spacing:-.01em;line-height:1.15}
.hdr-sub{font-size:.72rem;color:var(--mut);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.hdr-btns{display:flex;gap:7px;flex-shrink:0}
.hb{background:var(--pill);border:1px solid var(--line);border-radius:9px;padding:7px 12px;color:var(--ink);cursor:pointer;font-size:.8rem;font-weight:700;font-family:inherit;transition:background .15s,transform .1s}
.hb:hover{background:#e7eaef}.hb:active{background:#e2e5ea;transform:scale(.96)}
.hb.hi{padding:0;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center}
.hb.hi svg{width:19px;height:19px;stroke:var(--ink);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.hava{position:relative;width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:linear-gradient(135deg,#2b5aa0,#1e3f70);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:.92rem;line-height:1;cursor:pointer;font-family:inherit;flex-shrink:0;transition:transform .1s,box-shadow .15s}
.hava:hover{box-shadow:var(--shadow)}.hava:active{transform:scale(.94)}
.tip{position:relative}
.tip:hover::after,.tip.show::after{content:attr(data-tip);position:absolute;top:calc(100% + 7px);inset-inline-end:0;background:#1e293b;color:#fff;font-size:.72rem;font-weight:600;padding:5px 10px;border-radius:8px;white-space:nowrap;box-shadow:0 6px 20px rgba(16,24,40,.18);z-index:300;pointer-events:none}
.seg{display:flex;gap:6px}
.seg-b{flex:1;padding:9px 10px;border:1px solid var(--line);background:var(--pill);border-radius:9px;font-weight:700;font-size:.85rem;color:var(--ink);cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s,color .15s}
.seg-b.on{background:var(--accent);border-color:var(--accent);color:#fff}
.acc .acc-h{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:none;border:none;font-family:inherit;font-weight:800;font-size:.92rem;color:var(--ink);cursor:pointer;padding:2px;text-align:start}
.acc .acc-chev{transition:transform .2s;color:var(--mut);font-size:.8rem}
.acc.open .acc-chev{transform:rotate(180deg)}
.acc .acc-body{display:none;margin-top:10px;border-top:1px solid var(--line2);padding-top:8px}
.acc.open .acc-body{display:block}

/* Tabs */
.tabs{background:var(--card);border-bottom:1px solid var(--line);display:flex;position:sticky;top:0;z-index:99;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs-in{display:flex;max-width:840px;margin:0 auto;width:100%}
.tab{position:relative;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 15px 10px;text-align:center;font-size:.75rem;font-weight:700;color:var(--mut);cursor:pointer;white-space:nowrap;user-select:none;transition:color .18s}
.tab svg{width:21px;height:21px;stroke:var(--tc,currentColor);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;opacity:.8;transition:opacity .18s}
.tab:hover{color:var(--ink)}
.tab:hover svg{opacity:1}
.tab.on{color:var(--tc,var(--accent))}
.tab.on svg{opacity:1}
.tab.on::after{content:"";position:absolute;inset-inline:14px;bottom:0;height:3px;border-radius:3px 3px 0 0;background:var(--tc,var(--accent))}

/* Page */
.pg{padding:16px 14px calc(100px + env(safe-area-inset-bottom));max-width:640px;margin:0 auto}
.sec-lbl{display:flex;align-items:center;gap:7px;font-size:.72rem;font-weight:800;letter-spacing:.04em;color:var(--mut);margin:20px 2px 10px;text-transform:uppercase}
.sec-lbl::before{content:"";width:3px;height:13px;border-radius:3px;background:var(--sl,var(--accent));flex-shrink:0}
.sec-lbl:first-child{margin-top:2px}

.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px;box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s}
.card.b{border-color:#cfe0f5;box-shadow:var(--shadow),inset 3px 0 0 var(--accent)}
body.ar .card.b{box-shadow:var(--shadow),inset -3px 0 0 var(--accent)}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;gap:8px}
.card-h h3{font-size:.95rem;font-weight:800}
.muted{color:var(--mut)}.small{font-size:.79rem}

.pill{display:inline-flex;align-items:center;font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap}
.p-up{background:var(--pill);color:var(--mut)}
.p-due{background:var(--due-bg);color:var(--due)}
.p-late{background:var(--late-bg);color:var(--late)}
.p-done{background:var(--ok-bg);color:var(--ok)}
.chip{display:inline-block;font-size:.71rem;font-weight:800;background:var(--accent-l);color:var(--accent-d);padding:2px 8px;border-radius:6px;white-space:nowrap;vertical-align:middle}

/* Task rows */
.task{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-top:1px solid var(--line2)}
.task:first-of-type{border-top:none}
.chk{flex:0 0 auto;width:36px;height:36px;border-radius:10px;border:2px solid #c2cad4;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:800;color:#fff;margin-top:0;transition:.15s}
.chk:active{transform:scale(.9)}
.task.done .chk{background:var(--ok);border-color:var(--ok)}
.task.done .t-name{color:var(--mut)}
.t-main{flex:1;min-width:0}
.t-name{font-size:.9rem;font-weight:700;line-height:1.4}
.t-sub{font-size:.77rem;color:var(--mut);margin-top:3px}
.t-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.badge{font-size:.72rem;font-weight:800;padding:3px 9px;border-radius:7px;border:1px solid transparent}
.bg-crush{background:#f3ecfb;color:#6b3fa0;border-color:#e2d3f4}
.bg-flush{background:#e6f2fb;color:#1c5a8a;border-color:#cfe4f5}
.bg-fridge{background:#e2f3f4;color:#0e6b70;border-color:#c6e8e9}
.bg-mix{background:#fdf0e6;color:#9a5a1c;border-color:#f6ddc6}
.bg-pos{background:#eef0f4;color:#3d4653;border-color:#e0e3e8}
.confirm{margin-top:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;gap:9px}
.cline{display:flex;align-items:center;gap:9px;font-size:.81rem;font-weight:700;cursor:pointer}
.cline input{width:20px;height:20px;accent-color:var(--ok);flex-shrink:0}
.donenote{font-size:.73rem;color:var(--ok);margin-top:6px;font-weight:700}

/* Now */
.now-hero{background:linear-gradient(135deg,#2b5aa0,#1e3f70);border-radius:16px;padding:20px;margin-bottom:14px;text-align:center;color:#fff;box-shadow:var(--shadow)}
.now-time{font-size:2.3rem;font-weight:800;letter-spacing:-.02em;line-height:1}
.now-date{font-size:.83rem;opacity:.9;margin-top:6px}
.act{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px;border-inline-start:4px solid var(--due);box-shadow:var(--shadow)}
.act.late{border-inline-start-color:var(--late)}
.act.feed{border-inline-start-color:var(--accent)}
.act.clear{border-inline-start-color:var(--ok)}
.act-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;gap:8px}
.act-title{font-size:.94rem;font-weight:800}
.act-body{font-size:.85rem;line-height:1.6}
.act-list{margin:9px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
.act-list li{font-size:.84rem;padding-inline-start:15px;position:relative;font-weight:600}
.act-list li::before{content:"";position:absolute;inset-inline-start:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.mini-inst{font-size:.78rem;color:var(--due);font-weight:700;margin-top:3px}
.coming{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid var(--line2);font-size:.85rem}
.coming:first-of-type{border-top:none}
.coming .c-t{font-weight:800;color:var(--accent)}

/* Progress */
.prog{margin-bottom:10px}
.prog-h{display:flex;justify-content:space-between;font-size:.79rem;font-weight:700;margin-bottom:6px}
.prog-h span:last-child{color:var(--mut);font-weight:600}
.bar{height:8px;background:var(--line);border-radius:6px;overflow:hidden}
.fill{height:100%;border-radius:6px;background:var(--accent);transition:width .4s}
.fill.w{background:#3d84b0}

/* Feeding steps */
.step{display:flex;gap:12px;align-items:flex-start;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;cursor:pointer;background:#fff;user-select:none}
.step:active{transform:scale(.99)}
.step.done{background:var(--ok-bg);border-color:var(--ok-l)}
.step.lock{opacity:.5;cursor:default}
.step .num{flex:0 0 auto;width:25px;height:25px;border-radius:50%;border:2px solid #c2cad4;background:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:var(--mut)}
.step.done .num{background:var(--ok);border-color:var(--ok);color:#fff}
.step .s-t{font-size:.87rem;font-weight:700}
.step .s-h{font-size:.76rem;color:var(--mut);margin-top:3px}
.step .s-d{font-size:.73rem;color:var(--ok);font-weight:700;margin-top:4px}

/* Emergency */
.plate{background:linear-gradient(180deg,#2f6fc4,#1f5aa8);border:3px solid #cfd6df;border-radius:14px;overflow:hidden;color:#fff;max-width:none;margin:0 0 12px;box-shadow:var(--shadow)}
.plate-b{text-align:center;padding:18px 12px 15px;border-bottom:2px solid rgba(255,255,255,.4)}
.plate-b .lbl{font-size:.78rem;opacity:.92}
.plate-b .num{font-size:3rem;font-weight:800;line-height:1.05}
.plate-row{display:flex}
.plate-c{flex:1;text-align:center;padding:14px 10px}
.plate-c+.plate-c{border-inline-start:2px solid rgba(255,255,255,.4)}
.plate-c .lbl{font-size:.74rem;opacity:.92}
.plate-c .num{font-size:1.9rem;font-weight:800}
.addr-line{text-align:center;font-size:.83rem;font-weight:700;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;line-height:1.6;box-shadow:var(--shadow)}
.ecall{display:flex;align-items:center;justify-content:center;background:var(--late);color:#fff;border:none;border-radius:13px;padding:17px;font-size:1.05rem;font-weight:800;width:100%;cursor:pointer;font-family:inherit;margin-bottom:10px;box-shadow:0 4px 14px rgba(177,42,30,.28);transition:transform .1s,filter .15s}
.ecall:hover{filter:brightness(1.05)}.ecall:active{transform:scale(.99)}
.dnar{background:#fff;border:2px solid var(--late);border-radius:12px;padding:12px;margin-bottom:12px;font-weight:800;color:var(--late);text-align:center;font-size:.92rem;letter-spacing:.01em}
.estep{display:flex;align-items:center;gap:11px;margin:22px 2px 11px}
.estep:first-child{margin-top:4px}
.estep .n{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2b5aa0,#1e3f70);color:#fff;font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow)}
.estep .tt{font-weight:800;font-size:1rem;line-height:1.15}
.estep .ss{font-size:.74rem;color:var(--mut);font-weight:600;margin-top:2px}
.say{background:var(--accent-l);border:1px solid #cfe0f5;border-radius:11px;padding:11px 13px;margin-bottom:12px;font-size:.86rem;font-weight:700;color:var(--accent-d);line-height:1.6}
.say .lbl{font-size:.7rem;color:var(--accent);font-weight:800;display:block;margin-bottom:3px}
.idrow{display:flex;justify-content:space-between;gap:10px;padding:11px 0;border-top:1px solid var(--line2);font-size:.87rem}
.idrow:first-child{border-top:none}
.idrow .k{color:var(--mut);font-weight:700}
.idrow .v{font-weight:800;text-align:end}
.alert-box{background:var(--late-bg);border:1px solid var(--late-l);border-radius:14px;padding:15px;margin-bottom:12px}
.alert-box h4{font-size:.83rem;font-weight:800;color:var(--late);margin-bottom:9px}
.alert-box ul{margin:0;padding-inline-start:17px;font-size:.83rem;line-height:1.85}

/* Instructions */
.plist{counter-reset:s;list-style:none;padding:0;margin:0}
.plist li{position:relative;padding-inline-start:36px;margin-bottom:13px;font-size:.86rem;line-height:1.6;font-weight:600}
.plist li:last-child{margin-bottom:0}
.plist li::before{counter-increment:s;content:counter(s);position:absolute;inset-inline-start:0;top:0;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#2b5aa0,#1e3f70);color:#fff;font-size:.78rem;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.o2seq{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:11px}
.o2{min-width:38px;height:38px;padding:0 6px;border-radius:9px;background:var(--accent-l);color:var(--accent-d);font-weight:800;font-size:1.05rem;display:flex;align-items:center;justify-content:center}
.o2.hi{background:var(--due-bg);color:var(--due)}
.o2sep{color:var(--mut);font-size:.75rem;font-weight:700}
.note-info{font-size:.82rem;line-height:1.7;font-weight:600}
.note-info strong{color:var(--accent-d)}

/* Notes */
.note{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.note-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:.75rem;color:var(--mut);font-weight:700}
.note-txt{font-size:.87rem;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.note-img{margin-top:10px;width:100%;border-radius:11px;border:1px solid var(--line);display:block;cursor:pointer}
.note-del{background:none;border:none;color:var(--late);font-size:.75rem;font-weight:800;cursor:pointer;font-family:inherit}
.attach-prev{position:relative;margin-top:10px;display:inline-block}
.attach-prev img{max-width:140px;border-radius:11px;border:1px solid var(--line);display:block}
.attach-x{position:absolute;top:-9px;inset-inline-end:-9px;width:25px;height:25px;border-radius:50%;background:var(--late);color:#fff;border:none;font-size:.82rem;font-weight:800;cursor:pointer;line-height:1}

/* Log timeline */
.tl{display:flex;gap:12px;padding:11px 0;border-top:1px solid var(--line2)}
.tl:first-child{border-top:none}
.tl .tl-t{font-size:.75rem;color:var(--mut);white-space:nowrap;min-width:70px;font-weight:700;padding-top:1px}
.tl .tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px;background:var(--mut)}
.tl-dot.feed{background:var(--accent)}.tl-dot.med{background:var(--ok)}.tl-dot.care{background:#7a5cb0}.tl-dot.supp{background:var(--late)}.tl-dot.note{background:var(--due)}.tl-dot.supply{background:#0e6b70}.tl-dot.vitals{background:#b03a8a}
.tl .tl-c{flex:1;min-width:0}
.tl .tl-a{font-size:.85rem;font-weight:700;line-height:1.4}

/* Forms & buttons */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:.77rem;font-weight:800;color:var(--mut);margin-bottom:6px}
.fg input,.fg textarea,.fg select{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-family:inherit;font-size:16px;outline:none;background:#fff;color:var(--ink)}
.fg input:focus,.fg textarea:focus{border-color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end}
.grid2>.fg{margin-bottom:0}
.grid2:not(:last-child){margin-bottom:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border-radius:11px;border:none;cursor:pointer;font-family:inherit;font-size:.87rem;font-weight:800;transition:transform .1s,box-shadow .15s,background .15s,filter .15s}
.btn:active{transform:scale(.975)}
.btn.w{width:100%}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(43,90,160,.35)}
.btn-p:hover{filter:brightness(1.06)}
.btn-o{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.btn-o:hover{border-color:#cdd3dc;background:#fbfcfd}
.btn-d{background:var(--late-bg);color:var(--late)}
.btn-sm{padding:9px 13px;font-size:.81rem}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* FAB */
.fabz{position:fixed;bottom:calc(15px + env(safe-area-inset-bottom));inset-inline:14px;max-width:640px;margin:0 auto;display:flex;gap:10px;z-index:50}
.fab{flex:1;padding:15px;border-radius:14px;border:none;cursor:pointer;font-family:inherit;font-size:.87rem;font-weight:800;background:linear-gradient(135deg,#2b5aa0,#1e3f70);color:#fff;box-shadow:var(--shadow-l);transition:transform .1s,filter .15s}
.fab:hover{filter:brightness(1.07)}
.fab:active{transform:scale(.98)}
.fab.o{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:0 6px 18px rgba(16,24,40,.1)}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(19,24,32,.55);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.mbg.op{display:flex}
.mbg.center{align-items:center;padding:18px}
#setMod{align-items:center;padding:18px}
.msheet{background:#fff;border-radius:18px;padding:22px;width:100%;max-width:560px;max-height:calc(100vh - 36px);overflow-y:auto;box-shadow:var(--shadow-l)}
#uiModal{z-index:260}
#authMod{z-index:300;background:var(--bg);backdrop-filter:none;-webkit-backdrop-filter:none}
#authMod .uidlg{max-width:360px}
#boot{position:fixed;inset:0;z-index:290;background:var(--bg);display:flex;align-items:center;justify-content:center}
.boot-mark{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#2b5aa0,#1e3f70);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-l);animation:bootPulse 1.4s ease-in-out infinite}
.boot-mark svg{width:38px;height:38px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
@keyframes bootPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.85}}
.uidlg{background:#fff;border-radius:18px;padding:22px 20px 18px;width:100%;max-width:400px;box-shadow:var(--shadow-l);animation:uiPop .2s cubic-bezier(.34,1.4,.64,1)}
@keyframes uiPop{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.uidlg-t{font-size:1rem;font-weight:800;margin-bottom:8px}
.uidlg-m{font-size:.9rem;font-weight:600;line-height:1.65;color:var(--ink)}
.uidlg-btns{display:flex;gap:10px;margin-top:20px}
.uidlg-btns .btn{flex:1}
#uiInput{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-family:inherit;font-size:16px;outline:none;background:#fff;color:var(--ink)}
#uiInput:focus{border-color:var(--accent)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mh h3{font-size:1.02rem;font-weight:800}
.xb{width:31px;height:31px;border:none;border-radius:50%;background:var(--pill);color:var(--mut);cursor:pointer;font-size:.9rem;font-weight:800}
.hr{border:none;border-top:1px solid var(--line);margin:15px 0}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;align-items:center;justify-content:center;padding:16px}
.lb.op{display:flex}
.lb img{max-width:100%;max-height:100%;border-radius:8px}

/* Toast */
.toast{position:fixed;top:calc(15px + env(safe-area-inset-top));inset-inline:15px;background:var(--ink);color:#fff;padding:13px 17px;border-radius:12px;font-size:.87rem;font-weight:700;z-index:400;text-align:center;pointer-events:none;transform:translateY(-24px);opacity:0;transition:all .28s;max-width:612px;margin:0 auto}
.toast.vis{transform:translateY(0);opacity:1}
.innote{position:fixed;top:calc(12px + env(safe-area-inset-top));inset-inline:12px;max-width:560px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 34px rgba(16,24,40,.22);z-index:420;display:flex;align-items:center;gap:12px;padding:12px 14px;transform:translateY(-140%);opacity:0;transition:transform .32s cubic-bezier(.2,.8,.2,1),opacity .32s}
.innote.vis{transform:translateY(0);opacity:1}
.innote-ic{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#2b5aa0,#1e3f70);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.innote-ic svg{width:23px;height:23px;stroke:#fff;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.innote-tx{min-width:0;flex:1}
.innote-t{font-weight:800;font-size:.9rem;color:var(--ink);line-height:1.2}
.innote-b{font-size:.82rem;color:var(--mut);font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toast.ok{background:var(--ok)}.toast.err{background:var(--late)}.toast.warn{background:var(--due)}
.empty{text-align:center;padding:28px 16px;color:var(--mut);font-size:.85rem}
.warn-note{background:var(--due-bg);border:2px solid var(--due);border-radius:14px;padding:14px 16px;margin-bottom:12px;color:#7a4600;font-weight:800;font-size:.9rem;line-height:1.65;display:flex;gap:10px;align-items:flex-start}
.warn-note .wm{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--due);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900}
.warn-note strong{color:var(--late)}
.ov-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.ov-tile{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px;text-align:center}
.ov-tile.t-blue{background:#eef3fb;border-color:#dbe6f8}
.ov-tile.t-teal{background:#e8f6f3;border-color:#cde9e3}
.ov-tile.t-violet{background:#f2edfb;border-color:#e3d7f5}
.ov-tile.t-amber{background:#fbf3e5;border-color:#f3e1c6}
.ov-lbl{font-size:.72rem;color:var(--mut);font-weight:800}
.ov-big{font-size:1.45rem;font-weight:800;margin:4px 0 2px;line-height:1.1;direction:ltr}
.ov-big.txt{font-size:1rem;line-height:1.25;direction:inherit;white-space:normal}
.ov-sub{font-size:.68rem;color:var(--mut);direction:ltr;line-height:1.4}
@media(min-width:820px){.ov-grid{grid-template-columns:repeat(4,1fr)}}

/* Responsive: laptop / tablet */
@media(min-width:820px){
  .pg{max-width:860px;padding:22px 18px 110px}
  .hdr-top,.tabs-in{max-width:860px}
  .tabs-in{justify-content:space-between}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:13px;align-items:start}
  .cards>.card{margin-bottom:0}
  .fabz{max-width:860px}
  .now-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;align-items:start}
  .now-hero{grid-column:1/-1}
}
@media(max-width:640px){
  #setMod{align-items:flex-end;padding:0}
  .msheet{max-width:none;max-height:calc(92vh - env(safe-area-inset-bottom));border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
}

function getSlots(){
  const slots=JSON.parse(JSON.stringify(SCHED));
  slots.forEach(s=>{s.items=s.items.filter(itemScheduledToday);});
  const vd=getVitD();
  if(vd.dueToday){
    const s=slots.find(x=>x.t==='08:00');
    if(s)s.items.push({id:'vitd_monthly',cat:'med',med:'Cholecalciferol (Vitamin D3) 50,000 IU',com:'Vitamin D3',dose:'1 Capsule (monthly)',route:'NG Tube',flush:true,monthly:true});
  }
  if(new Date().getDay()===0){
    const s=slots.find(x=>x.t==='08:00');
    if(s)s.items.unshift({id:'glucose_sun',cat:'care',act:{ar:'قياس سكر الدم وتسجيل القراءة',en:'Blood Glucose Check — record reading'}});
  }
  slots.sort((a,b)=>hm2min(a.t)-hm2min(b.t)); // chronological order — starts at 12:00 AM (00:00)
  return slots;
}
function flatItems(){const m={};getSlots().forEach(s=>s.items.forEach(it=>{m[it.id]={...it,slot:s.t};}));return m;}
function itemTitle(it){return it.cat==='care'?tx(it.act):(it.med+(it.com?` (${it.com})`:''));}

function dayDiff(from,to=TODAY){
  const a=new Date(from+'T00:00:00'),b=new Date(to+'T00:00:00');
  return Math.floor((b-a)/86400000);
}
function itemScheduledToday(it){
  if(it.daysOfWeek&&Array.isArray(it.daysOfWeek)&&!it.daysOfWeek.includes(new Date().getDay()))return false;
  if(it.everyOtherDayStart){
    const d=dayDiff(it.everyOtherDayStart);
    return d>=0&&d%2===0;
  }
  if(it.everyNDays&&it.startDate){
    const d=dayDiff(it.startDate);
    return d>=0&&d%it.everyNDays===0;
  }
  return true;
}
function getVitD(){
  const next=localStorage.getItem('vitD_next')||'2026-07-29';
  const d=Math.ceil((new Date(next)-new Date(TODAY))/86400000);
  return {dueToday:d<=0,daysLeft:Math.max(0,d),next};
}
function daysUntil(ds){return Math.ceil((new Date(ds)-new Date(TODAY))/86400000);}

function ft(iso){if(!iso)return'—';const d=new Date(iso);let h=d.getHours();const ap=h<12?'AM':'PM';let hh=h%12;if(hh===0)hh=12;return `${hh}:${p2(d.getMinutes())} ${ap}`;}
function sinceStr(iso){
  if(!iso)return'';

  if(mins<1)return L('الآن','just now');
  const h=Math.floor(mins/60),m=mins%60;
  if(h<=0)return L('منذ '+m+' د','for '+m+'m');
  return L('منذ '+h+' س'+(m?' و'+m+' د':''),'for '+h+'h'+(m?' '+m+'m':''));
}
function curMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function hm2min(t){const[h,m]=t.split(':').map(Number);return h*60+m;}

}

function buildSessions(){
  const base=ST.sh*60+ST.sm;
  // 6 feeds spaced 4h, mapped onto a single day and ordered by clock (day starts at 12:00 AM)
  const mins=Array.from({length:6},(_,k)=>((base+k*240)%1440)).sort((a,b)=>a-b);
  return mins.map((tm,i)=>{
    const h=Math.floor(tm/60),m=tm%60;
    const key=`sess_${TODAY}_${i+1}`;
    let sv=null;try{sv=JSON.parse(localStorage.getItem(key));}catch(e){}
    return {n:i+1,h,m,t:`${p2(h)}:${p2(m)}`,steps:sv?.steps||[0,0,0,0,0],times:sv?.times||[null,null,null,null,null],key};
  });
}
function sessStatus(s){
  if(s.steps.every(Boolean))return 'done';
  const now=new Date(),tv=new Date(now);tv.setHours(s.h,s.m,0,0);

  return d>=-15&&d<245?'active':d>=245?'late':'upcoming';
}

    const it=('stock'in s)?s:{id:s.id,name:s.name,stock:s.qty||0,used:0};

async function setupSupabase(){

  }catch(err){}
}
async function loadRole(){

async function ensureAuth(){
  if(!sb){updateAuthUi();return true;}
  try{
    const {data}=await sb.auth.getSession();
    currentUser=data&&data.session?data.session.user:null;
    if(currentUser)await loadRole();
    updateAuthUi();
    sb.auth.onAuthStateChange(async (_event,session)=>{
      const was=!!currentUser;
      currentUser=session?session.user:null;
      await loadRole();
      updateAuthUi();
      if(currentUser){
        document.getElementById('authMod').classList.remove('op');
        restoreLang();
        if(!was)goTab('emerg');else render();
        _syncReady=true;syncDown();subscribeRealtime();hideBoot();if(notifOn)subscribePush();
      }else{
        render();openAuth();

  }catch(err){}

}

function subscribeRealtime(){
  if(!sb||_rt)return;
  try{_rt=sb.channel('carelog')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'action_log'},p=>{
      const r=p&&p.new;if(!r||r.client_id===SID)return;
      if(r.action_detail)notifyOthers(r.action_detail);

function ageFrom(dob){
  const m=String(dob).split('/');if(m.length!==3)return null;
  const b=new Date(+m[2],+m[1]-1,+m[0]);if(isNaN(b))return null;
  const t=new Date(TODAY);let a=t.getFullYear()-b.getFullYear();
  if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;
  return a;
}

        return `<div class="coming"><span class="muted">${L('التبوّل / التبرّز','Urine / Stool')}</span><span style="font-weight:700;text-align:end">${p.join(' · ')}</span></div>`;
      })()}
      ${(function(){const lb=localStorage.getItem('last_bath');if(!lb)return '';
        const b=new Date(lb),t=new Date();
        const days=Math.round((new Date(t.getFullYear(),t.getMonth(),t.getDate())-new Date(b.getFullYear(),b.getMonth(),b.getDate()))/86400000); // calendar-day difference
        const ago=days<=0?L('اليوم','today'):days===1?L('أمس','yesterday'):(ST.lang==='ar'?(days===2?'منذ يومين':'منذ '+days+' أيام'):days+'d ago');
        return `<div class="coming"><span class="muted">${L('آخر استحمام','Last bath')}</span><span style="font-weight:700;text-align:end">${b.toLocaleDateString(ST.lang==='ar'?'ar':'en-GB',{day:'numeric',month:'long'})} <span class="muted small">· ${ago}</span></span></div>`;
      })()}
      ${lowSup?`<div class="coming"><span class="muted">${L('مستهلكات قرب النفاد','Supplies running low')}</span><span style="font-weight:800;color:var(--late)">${lowSup}</span></div>`:''}
    </div>
  </div>`;

  const dueSlots=slots.map(s=>({s,st:slotStatus(s)})).filter(x=>x.st==='due'||x.st==='late');
  const actSess=ST.sessions.find(s=>sessStatus(s)==='active'&&!s.steps.every(Boolean));
  const lateSess=ST.sessions.find(s=>sessStatus(s)==='late'&&!s.steps.every(Boolean));
  let anything=false;

  if(lateSess){
    anything=true;const si=lateSess.steps.findIndex(x=>!x);
    html+=`<div class="act late"><div class="act-top"><span class="act-title">${L('تغذية فائتة — الجلسة','Overdue feed — Session')} ${lateSess.n}</span><span class="pill p-late">${to12(lateSess.t)}</span></div>
      <div class="act-body">${L('الخطوة المطلوبة','Required step')}: <strong>${tx(STEP_DEF[si].t)}</strong><div class="mini-inst">${tx(STEP_DEF[si].h)}</div></div>
      <div style="margin-top:11px"><button class="btn btn-p btn-sm" onclick="goTab('feed')">${L('فتح التغذية','Open Feeding')}</button></div></div>`;
  }
  dueSlots.forEach(({s,st})=>{
    anything=true;
    const pend=s.items.filter(it=>!itemDone(it.id));
    const inst=[];
    if(pend.some(it=>it.crush))inst.push(L('طحن الأقراص طحنًا ناعمًا جدًا قبل الإعطاء عبر NGT','Crush tablets very finely before giving via NGT'));
    if(pend.some(it=>it.fridge))inst.push(L('دواء Lansoprazole يُحفظ في الثلاجة','Lansoprazole must be kept refrigerated'));
    if(pend.some(it=>it.flush))inst.push(L('الإرواء (Flush) بعد كل دواء مع تأكيد تنفيذه','Flush after each med and confirm it'));
    const hasMed=pend.some(it=>it.cat!=='care');
    const actTitle=hasMed?L('مطلوب الآن — أدوية','Due now — Medication'):L('مطلوب الآن — رعاية','Due now — Care');
    html+=`<div class="act ${st==='late'?'late':''}"><div class="act-top"><span class="act-title">${actTitle}</span><span class="pill ${st==='late'?'p-late':'p-due'}">${to12(s.t)} · ${tx(STLABEL[st])}</span></div>
      <ul class="act-list">${pend.map(it=>`<li>${itemTitle(it)}${it.cat==='care'&&it.position?` — <strong>${tx(it.position)}</strong>`:''}${it.route?` <span class="chip">${it.route}</span>`:''}</li>`).join('')}</ul>
      ${inst.length?`<div style="margin-top:10px">${inst.map(i=>`<div class="mini-inst">• ${i}</div>`).join('')}</div>`:''}
      <div style="margin-top:11px"><button class="btn btn-p btn-sm" onclick="goTab('meds')">${L('فتح الأدوية','Open Meds')}</button></div></div>`;
  });
  if(actSess){
    anything=true;const si=actSess.steps.findIndex(x=>!x);
    html+=`<div class="act feed"><div class="act-top"><span class="act-title">${L('تغذية جارية — الجلسة','Feeding in progress — Session')} ${actSess.n}</span><span class="pill p-due">${to12(actSess.t)}</span></div>
      <div class="act-body">${L('الخطوة التالية','Next step')}: <strong>${tx(STEP_DEF[si].t)}</strong><div class="mini-inst">${tx(STEP_DEF[si].h)}</div>
      ${si===1?`<div class="mini-inst">• ${L('الإرواء (Flush) بعد التغذية إلزامي مع تأكيده','Flush after feed is mandatory — confirm it')}</div>`:''}</div>
      <div style="margin-top:11px"><button class="btn btn-p btn-sm" onclick="goTab('feed')">${L('فتح التغذية','Open Feeding')}</button></div></div>`;
  }
  const vPending=VITALS_TIMES.map((t,i)=>({t,st:vitalsSlotStatus(i)})).filter(x=>x.st==='due'||x.st==='late');
  if(vPending.length){
    anything=true;const vLate=vPending.some(x=>x.st==='late');
    html+=`<div class="act" style="border-inline-start-color:#b03a8a"><div class="act-top"><span class="act-title">${L('قياس المؤشرات الحيوية','Check vital signs')}</span><span class="pill ${vLate?'p-late':'p-due'}">${vPending.map(x=>to12(x.t)).join(' · ')}</span></div>
      <div class="act-body">${L('سجّل: الحرارة والضغط والنبض والتنفس والأكسجين والسكر، والبول والبراز.','Record: temperature, BP, pulse, respiration, SpO₂, glucose, and urine & stool.')}</div>
      <div style="margin-top:11px"><button class="btn btn-p btn-sm" style="background:#b03a8a" onclick="goTab('vitals')">${L('فتح القياسات وتسجيلها','Open & record Vitals')}</button></div></div>`;
  }
  if(!anything){
    const up=[];
    slots.forEach(s=>{if(!slotAllDone(s)&&hm2min(s.t)>=curMin())up.push({t:s.t,label:slotLabel(s)});});
    ST.sessions.forEach(s=>{if(!s.steps.every(Boolean)){const m=s.h*60+s.m;if(m>=curMin())up.push({t:s.t,label:L('تغذية — الجلسة '+s.n,'Feed — Session '+s.n)});}});
    up.sort((a,b)=>hm2min(a.t)-hm2min(b.t));
    html+=`<div class="act clear"><div class="act-title">${L('لا يوجد مطلوب الآن','Nothing due right now')}</div>
      <div class="act-body muted" style="margin-top:6px">${up.length?L('التالي: ','Next: ')+tx(up[0].label)+' — '+to12(up[0].t):L('اكتملت جميع المهام حتى الآن','All tasks done for now')}</div></div>`;
  }
  html+=`</div>`;

  const upcoming=[];
  slots.forEach(s=>{
    if(slotAllDone(s)||slotStatus(s)!=='upcoming')return;
    const items=s.items.filter(it=>!itemDone(it.id)).map(it=>({title:itemTitle(it),sub:it.cat==='care'?(it.position?tx(it.position):''):[it.dose,it.route].filter(Boolean).join(' · ')}));
    upcoming.push({key:'m'+s.t.replace(':',''),t:s.t,label:slotLabel(s),n:items.length,items});
  });
  ST.sessions.forEach(s=>{
    if(s.steps.every(Boolean)||sessStatus(s)!=='upcoming')return;
    const items=STEP_DEF.map((d,i)=>({d,i})).filter(x=>!s.steps[x.i]).map(x=>({title:tx(x.d.t),sub:tx(x.d.h)}));
    upcoming.push({key:'f'+s.n,t:s.t,label:L('تغذية — الجلسة '+s.n,'Feed — Session '+s.n),n:items.length,items});
  });
  upcoming.sort((a,b)=>hm2min(a.t)-hm2min(b.t));
  if(upcoming.length){
    html+=`<div class="sec-lbl">${L('المواعيد التالية','Coming Up')} <span class="muted small">(${upcoming.length})</span></div>
      <div class="small muted" style="margin:-4px 2px 8px">${L('اضغط على أي موعد لعرض إجراءاته','Tap any time to see its actions')}</div>`;
    upcoming.forEach(u=>{
      const open=nowOpenSlots.has(u.key);
      const body=u.items.length?u.items.map(it=>`<div class="coming"><span>${esc(it.title)}${it.sub?` <span class="muted small">— ${esc(it.sub)}</span>`:''}</span></div>`).join(''):`<div class="small muted">${L('لا تفاصيل','No details')}</div>`;
      html+=`<div class="card acc${open?' open':''}" id="up_${u.key}" style="margin-bottom:8px;padding:12px 14px">
        <button type="button" class="acc-h" onclick="toggleUpSlot('${u.key}')">
          <span>${tx(u.label)} <span class="muted small">(${u.n})</span></span>
          <span style="display:flex;align-items:center;gap:9px"><span class="c-t">${to12(u.t)}</span><span class="acc-chev">▾</span></span>
        </button>
        <div class="acc-body">${body}</div>
      </div>`;
    });
  }

  return html;
}
function toggleUpSlot(k){const c=document.getElementById('up_'+k);if(!c)return;const open=c.classList.toggle('open');if(open)nowOpenSlots.add(k);else nowOpenSlots.delete(k);}

function ovTile(label,big,sub,flag,tone){
  const col=flag==='late'?'var(--late)':(tone?`var(--tone-${tone})`:'var(--ink)');

  return `<div class="ov-tile${tone?' t-'+tone:''}"><div class="ov-lbl">${label}</div><div class="ov-big${isTxt?' txt':''}" style="color:${col}">${big}</div><div class="ov-sub">${sub}</div></div>`;
}

function rTask(it){
  const d=itemDone(it.id);
  const badges=[];
  if(it.crush)badges.push(`<span class="badge bg-crush">${L('يُطحن ناعمًا جدًا','Crush finely')}</span>`);
  if(it.flush)badges.push(`<span class="badge bg-flush">${L('إرواء (Flush) بعده','Flush after')}</span>`);
  if(it.fridge)badges.push(`<span class="badge bg-fridge">${L('يُحفظ في الثلاجة','Keep refrigerated')}</span>`);
  if(it.mix)badges.push(`<span class="badge bg-mix">${L('يُخلط معًا','Mix together')}</span>`);
  if(it.position)badges.push(`<span class="badge bg-pos">${L('الوضعية','Position')}: ${tx(it.position)}</span>`);
  if(it.note)badges.push(`<span class="badge bg-pos">${tx(it.note)}</span>`);
  const sub=it.dose?it.dose:'';
  const confirm=(!d&&it.flush)?`<div class="confirm">
     ${it.crush?`<label class="cline"><input type="checkbox" id="cr_${it.id}"> ${L('تم الطحن جيدًا','Crushed finely')}</label>`:''}
     <label class="cline"><input type="checkbox" id="fl_${it.id}"> ${L('تم الإرواء (Flush) بعد الدواء','Flush done after')}</label>
   </div>`:'';
  const doneNote=d?`<div class="donenote">${L('تم','Done')} · ${ft(d.at)}${d.crushed?' · '+L('طُحن','crushed'):''}${d.flushed?' · Flush ✓':''}</div>`:'';
  return `<div class="task ${d?'done':''}">
    <button class="chk" onclick="toggleTask('${it.id}')">${d?'✓':''}</button>
    <div class="t-main">
      <div class="t-name">${itemTitle(it)}${it.route?` <span class="chip">${it.route}</span>`:''}</div>
      ${sub?`<div class="t-sub" dir="ltr" style="text-align:start">${sub}</div>`:''}
      ${badges.length?`<div class="t-badges">${badges.join('')}</div>`:''}
      ${confirm}${doneNote}
    </div>
  </div>`;
}
async function toggleTask(id){
  if(!requireEditor())return;
  const meta=flatItems()[id];if(!meta)return;
  if(ST.medsDone[id]){delete ST.medsDone[id];}
  else{
    let rec={at:new Date().toISOString()};
    if(meta.flush){
      const cr=meta.crush?document.getElementById('cr_'+id)?.checked:true;
      const fl=document.getElementById('fl_'+id)?.checked;
      if(meta.crush&&!cr&&!(await uiConfirm(L('لم يتم تأكيد طحن الدواء. هل تريد المتابعة؟','Not confirmed as crushed. Continue anyway?'),{danger:true,ok:L('متابعة','Continue')})))return;
      if(!fl&&!(await uiConfirm(L('لم يتم تأكيد الإرواء (Flush). هل تريد المتابعة؟','Flush not confirmed. Continue anyway?'),{danger:true,ok:L('متابعة','Continue')})))return;
      rec.crushed=!!cr;rec.flushed=!!fl;
    }
    ST.medsDone[id]=rec;
    logAct(meta.cat==='care'?'care':'med',itemTitle(meta)+' — '+L('تم الإعطاء','done'));
    if(meta.monthly){const nd=new Date();nd.setDate(nd.getDate()+30);localStorage.setItem('vitD_next',nd.toISOString().split('T')[0]);}
    toast(L('تم التسجيل','Logged'),'ok');
  }
  localStorage.setItem(`meds_${TODAY}`,JSON.stringify(ST.medsDone));
  if(sb&&ST.medsDone[id]){const m=ST.medsDone[id];try{sb.from('medications_log').insert({log_date:TODAY,slot_time:meta.slot,med_name:itemTitle(meta),crush_confirmed:m.crushed||false,flush_done:m.flushed||false,given_at:m.at}).then(()=>{},()=>{});}catch(err){}}
  render();
}
async function giveSupp(){
  if(!requireEditor())return;
  if(!(await uiConfirm(L('تسجيل إعطاء اللبوس الآن؟','Log suppository given now?'))))return;
  const e={at:new Date().toISOString()};
  ST.suppLog.push(e);localStorage.setItem(`supp_${TODAY}`,JSON.stringify(ST.suppLog));
  logAct('supp',L('إعطاء لبوس Bisacodyl (عند اللزوم)','Bisacodyl suppository given (PRN)'));
  if(sb)try{sb.from('suppository_log').insert({given_date:TODAY,given_at:e.at}).then(()=>{},()=>{});}catch(err){}
  render();toast(L('تم تسجيل اللبوس','Suppository logged'),'ok');
}
async function givePrn(name){
  if(!requireEditor())return;
  if(!(await uiConfirm(L('تسجيل إعطاء ','Log ')+name+L(' الآن؟',' now?'))))return;
  logAct('med',name+L(' — عند اللزوم',' — PRN'));
  render();toast(L('تم التسجيل','Logged'),'ok');
}
function logBath(){if(!requireEditor())return;localStorage.setItem('last_bath',new Date().toISOString());logAct('care',L('استحمّ المريض','Patient bathed'));render();toast(L('تم تسجيل الاستحمام','Bath logged'),'ok');}

// ============ FEEDING TAB ============
function rFeed(){
  const foodMl=ST.sessions.filter(s=>s.steps[0]).length*150;
  const waterMl=ST.sessions.filter(s=>s.steps[3]).length*200;
  const dn=ST.sessions.filter(s=>s.steps.every(Boolean)).length;
  let html=`<div style="text-align:end;margin-bottom:10px"><button class="btn btn-o btn-sm" onclick="printFeedSheet()">${L('طباعة الجدول للتعليم اليدوي','Print schedule for manual ticking')}</button></div>
  ${canEdit()?`<div class="sec-lbl">${L('موعد أول جلسة تغذية','First feeding session')}</div>
    <div class="card" style="display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap">
      <div class="fg" style="margin:0;flex:1;min-width:150px"><label>${L('موعد أول جلسة الصبح','First session (morning)')}</label><input type="time" id="feedStartF" value="${p2(ST.sh)}:${p2(ST.sm)}"></div>
      <button class="btn btn-p btn-sm" style="min-width:130px;height:44px" onclick="saveFeedTime()">${L('حفظ وبناء الجدول','Save & build')}</button>
    </div>
    <div class="small muted" style="margin:-2px 2px 12px">${L('سجّلي موعد أول جلسة الصبح — والجدول والتنبيهات تُبنى تلقائيًا (كل جلسة بعد السابقة بـ4 ساعات).','Set the first morning session — the schedule and reminders build automatically (each session 4 hours after the previous).')}</div>`:''}
    <div class="card">
    <div class="card-h"><h3>${L('تغذية اليوم',"Today's Feeding")}</h3><span class="small muted">${dn}/6 ${L('جلسات','sessions')}</span></div>
    <div class="prog"><div class="prog-h"><span>${L('تغذية','Food')}</span><span>${foodMl} / 900 ml</span></div><div class="bar"><div class="fill" style="width:${Math.min(100,foodMl/9)}%"></div></div></div>
    <div class="prog"><div class="prog-h"><span>${L('ماء','Water')}</span><span>${waterMl} / 1200 ml</span></div><div class="bar"><div class="fill w" style="width:${Math.min(100,waterMl/12)}%"></div></div></div>
  </div>
  <div class="warn-note"><span class="wm">!</span><span>${L('تحذير: يجب إجلاس المريض بزاوية <strong>40–45°</strong> طوال فترة التغذية ولمدة بعدها — للوقاية من الالتهاب الرئوي الشفطي.','Warning: seat the patient at <strong>40–45°</strong> throughout the feed and for a while after — to prevent aspiration pneumonia.')}</span></div>`;
  ST.sessions.forEach((s,xi)=>{
    const st=sessStatus(s),cnt=s.steps.filter(Boolean).length;
    const pill={done:'p-done',active:'p-due',late:'p-late',upcoming:'p-up'}[st];
    const lbl={done:{ar:'تم',en:'Done'},active:{ar:'جارية',en:'Active'},late:{ar:'فائتة',en:'Overdue'},upcoming:{ar:'قادمة',en:'Upcoming'}}[st];
    html+=`<div class="card ${st==='active'||st==='late'?'b':''}">
      <div class="card-h"><h3>${L('الجلسة','Session')} ${s.n} <span class="muted small">· ${L('أكل','Feed')} ${to12(s.t)} · ${L('ماء','Water')} ${to12(waterTime(s))}</span></h3><span class="pill ${pill}">${tx(lbl)} · ${cnt}/5</span></div>
      ${STEP_DEF.map((d,si)=>rStep(d,si,xi,s)).join('')}</div>`;
  });
  return html;
}
function waterMin(s){return (s.h*60+s.m+120)%1440;} // water is due ~2h after the feed starts
function waterTime(s){const w=waterMin(s);return `${p2(Math.floor(w/60))}:${p2(w%60)}`;}
function rStep(def,si,xi,s){
  const dn=s.steps[si],prev=si===0||s.steps[si-1];
  const cls='step'+(dn?' done':prev?'':' lock');
  const clickable=dn||prev;
  const oc=clickable?`onclick="tapStep(${xi},${si})" role="button" tabindex="0"`:'';
  const etime=si===0?to12(s.t):(si===3?to12(waterTime(s)):''); // show the expected time on the feed & water steps
  return `<div class="${cls}" ${oc}>
    <div class="num">${dn?'✓':si+1}</div>
    <div style="flex:1"><div class="s-t">${tx(def.t)}${etime?` <span class="muted small" style="font-weight:700">· ${etime}</span>`:''}</div><div class="s-h">${tx(def.h)}</div>${s.times[si]?`<div class="s-d">${L('تم','done')} · ${ft(s.times[si])}</div>`:''}</div>
  </div>`;
}
function tapStep(xi,si){
  if(!requireEditor())return;
  const s=ST.sessions[xi];
  if(si>0&&!s.steps[si-1]&&!s.steps[si]){toast(L('يلزم إكمال الخطوة السابقة أولًا','Complete previous step first'),'warn');return;}
  if(s.steps[si]){for(let i=si;i<5;i++){s.steps[i]=0;s.times[i]=null;}}
  else{
    s.steps[si]=1;s.times[si]=new Date().toISOString();
    logAct('feed',`${L('الجلسة','Session')} ${s.n} — ${tx(STEP_DEF[si].t)}`);
  }
  localStorage.setItem(s.key,JSON.stringify({steps:s.steps,times:s.times}));
  render();
  if(s.steps[si]){s.steps.every(Boolean)?toast(L('اكتملت الجلسة '+s.n,'Session '+s.n+' complete'),'ok'):toast(L('تم تسجيل الخطوة','Step logged'),'ok');}
}

// ============ VITALS TAB ============
const VITAL_DEF=[
  {k:'temp',ar:'درجة الحرارة',en:'Temperature',unit:'°C',ph:'36.5',step:'0.1'},
  {k:'pulse',ar:'النبض',en:'Pulse',unit:'bpm',ph:'75'},
  {k:'sys',ar:'ضغط انقباضي',en:'Systolic BP',unit:'mmHg',ph:'120'},
  {k:'dia',ar:'ضغط انبساطي',en:'Diastolic BP',unit:'mmHg',ph:'80'},
  {k:'rr',ar:'التنفس',en:'Respiration',unit:'/min',ph:'20'},
  {k:'spo2',ar:'الأكسجين SpO₂',en:'SpO₂',unit:'%',ph:'98'},
  {k:'glucose',ar:'سكر الدم',en:'Blood glucose',unit:'mmol/L',ph:'5.5',step:'0.1'},
];
// Daily vital-signs routine — 3 times/day (morning 6, afternoon 2, night 10)
const VITALS_TIMES=['06:00','14:00','22:00']; // reminder times only — timing is flexible
const VIT_ORD=[{ar:'القياس الأول',en:'1st reading'},{ar:'القياس الثاني',en:'2nd reading'},{ar:'القياس الثالث',en:'3rd reading'}];
// 3 checks/day with FLEXIBLE timing: any reading counts toward the next open slot,
// regardless of the exact clock time it was taken.
function vitalsTakenCount(arr){arr=arr||ST.vitals||[];return arr.length;}
function vitalsDoneCount(arr){return Math.min(VITALS_TIMES.length,vitalsTakenCount(arr));}
function vitalsSlotStatus(i){
  if(i<vitalsTakenCount())return 'done';           // already covered by a recorded reading
  const m=hm2min(VITALS_TIMES[i]),n=curMin();
  if(n<m-30)return 'upcoming';
  if(n<=m+90)return 'due';
  return 'late';
}
function vitalStr(v){
  const parts=[];
  if(v.temp!=null)parts.push(`${L('حرارة','Temp')} ${v.temp}°C`);
  if(v.sys!=null||v.dia!=null)parts.push(`${L('ضغط','BP')} ${v.sys??'—'}/${v.dia??'—'}`);
  if(v.pulse!=null)parts.push(`${L('نبض','HR')} ${v.pulse}`);
  if(v.rr!=null)parts.push(`${L('تنفس','RR')} ${v.rr}`);
  if(v.spo2!=null)parts.push(`SpO₂ ${v.spo2}%`);
  if(v.glucose!=null)parts.push(`${L('سكر','Glu')} ${v.glucose}`);
  if(v.urine)parts.push(`${L('البول','Urine')}: ${excreta(v.urine,'urine')}${v.urineNote?` (${v.urineNote})`:''}`);
  if(v.stool)parts.push(`${L('البراز','Stool')}: ${excreta(v.stool,'stool')}${v.stoolNote?` (${v.stoolNote})`:''}`);
  return parts.join(' · ');
}
function excreta(s,type){
  if(s==='none')return type==='urine'?L('لم يتبوّل','No urine'):L('لم يتبرّز','No stool');
  return s==='normal'?L('طبيعي','Normal'):L('غير طبيعي','Abnormal');
}
function excretaToggle(k){const sel=document.getElementById('vt_'+k),w=document.getElementById('wrap_vt_'+k+'_c');if(w)w.style.display=(sel&&sel.value==='abnormal')?'block':'none';}
function rVitals(){
  const list=ST.vitals.slice().sort((a,b)=>b.at.localeCompare(a.at));
  const done=vitalsDoneCount();
  const routine=VITALS_TIMES.map((t,i)=>{const st=vitalsSlotStatus(i);const pill={done:'p-done',due:'p-due',late:'p-late',upcoming:'p-up'}[st];const lbl={done:{ar:'تم',en:'Done'},due:{ar:'الآن',en:'Now'},late:{ar:'فائت',en:'Overdue'},upcoming:{ar:'قادم',en:'Upcoming'}}[st];return `<div class="coming"><span>${tx(VIT_ORD[i])} <span class="muted small">· ${L('تذكير','reminder')} ${to12(t)}</span></span><span class="pill ${pill}">${tx(lbl)}</span></div>`;}).join('');
  return `
    <div class="sec-lbl">${L('روتين اليوم',"Today's Routine")}</div>
    <div class="card b"><div class="card-h"><h3>${L('قياس المؤشرات الحيوية','Vital-signs checks')}</h3><span class="small muted">${done}/3</span></div>${routine}</div>
    <div class="sec-lbl">${L('تسجيل قياسات جديدة','Record New Reading')}</div>
    <div class="card">
      <div class="grid2">
        ${VITAL_DEF.map(v=>`<div class="fg"><label>${tx(v)} (<bdi dir="ltr">${v.unit}</bdi>)</label><input id="vt_${v.k}" type="number" inputmode="decimal" ${v.step?`step="${v.step}"`:''} placeholder="${v.ph}" dir="ltr"></div>`).join('')}
      </div>
      <div class="grid2">
        <div class="fg"><label>${L('البول','Urine')}</label><select id="vt_urine" onchange="excretaToggle('urine')"><option value="">${L('— لم يُسجّل','— not recorded')}</option><option value="none">${L('لم يتبوّل','No urine')}</option><option value="normal">${L('تبوّل — طبيعي','Passed — normal')}</option><option value="abnormal">${L('تبوّل — فيه مشكلة','Passed — problem')}</option></select></div>
        <div class="fg"><label>${L('البراز','Stool')}</label><select id="vt_stool" onchange="excretaToggle('stool')"><option value="">${L('— لم يُسجّل','— not recorded')}</option><option value="none">${L('لم يتبرّز','No stool')}</option><option value="normal">${L('تبرّز — طبيعي','Passed — normal')}</option><option value="abnormal">${L('تبرّز — فيه مشكلة','Passed — problem')}</option></select></div>
      </div>
      <div class="fg" id="wrap_vt_urine_c" style="display:none"><label>${L('وصف مشكلة البول','Describe urine problem')}</label><input id="vt_urine_c" placeholder="${L('مثال: دم / لون داكن / كمية قليلة','e.g. blood / dark / low output')}"></div>
      <div class="fg" id="wrap_vt_stool_c" style="display:none"><label>${L('وصف مشكلة البراز','Describe stool problem')}</label><input id="vt_stool_c" placeholder="${L('مثال: دم / إسهال / إمساك','e.g. blood / diarrhea / constipation')}"></div>
      <button class="btn btn-p w" onclick="saveVital()">${L('حفظ القياسات','Save reading')}</button>
    </div>
    <div class="sec-lbl">${L('قياسات اليوم',"Today's Readings")}</div>
    ${list.length?list.map(v=>`<div class="card" style="padding:13px 15px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
          <div style="font-weight:700;font-size:.86rem;line-height:1.6" dir="ltr">${vitalStr(v)}</div>
          <div style="text-align:end;flex-shrink:0"><div class="small muted">${ft(v.at)}</div><button class="note-del" onclick="delVital('${v.id}')">${L('حذف','Delete')}</button></div>
        </div>
      </div>`).join('')
      :`<div class="empty">${L('لم تُسجّل قياسات اليوم','No readings recorded today')}</div>`}`;
}
function saveVital(){
  if(!requireEditor())return;
  const v={id:Date.now().toString(36),at:new Date().toISOString()};
  let any=false;
  VITAL_DEF.forEach(d=>{
    const el=document.getElementById('vt_'+d.k);const raw=el?el.value.trim():'';
    if(raw!==''){const num=parseFloat(raw);if(!isNaN(num)){v[d.k]=num;any=true;}}
  });
  const uu=document.getElementById('vt_urine')?.value;if(uu){v.urine=uu;if(uu==='abnormal'){const c=(document.getElementById('vt_urine_c')?.value||'').trim();if(c)v.urineNote=c;}any=true;}
  const ss=document.getElementById('vt_stool')?.value;if(ss){v.stool=ss;if(ss==='abnormal'){const c=(document.getElementById('vt_stool_c')?.value||'').trim();if(c)v.stoolNote=c;}any=true;}
  if(ss&&ss!=='none')localStorage.setItem('last_bm',v.at); // recording a bowel movement in Vitals updates "last BM" (drives the PRN suppository logic)
  if(!any){toast(L('أدخل قيمة واحدة على الأقل','Enter at least one value'),'warn');return;}
  ST.vitals.push(v);
  localStorage.setItem(`vitals_${TODAY}`,JSON.stringify(ST.vitals));
  logAct('vitals',L('قياسات حيوية: ','Vitals: ')+vitalStr(v));

function supRem(s){return Math.max(0,(s.stock||0)-(s.used||0));}
// Auto-classify an item as medication vs supply (used for items added before the Type field existed)
const MED_TOKENS=['ipratropium','atrovent','nebusal','sodium chloride','saline','clopidogrel','pido','linagliptin','trajenta','bisoprolol','lansoprazole','levetiracetam','keppra','chlorhexidine','mouthwash','mouth wash','polyethylene','glycol','movicol','senna','simethicone','flat-q','clonazepam','clonotril','bisacodyl','cholecalciferol','vitamin'];
function classifySupply(name){
  const t=(name||'').toLowerCase();
  if(MED_TOKENS.some(tok=>t.indexOf(tok)>-1))return 'med';
  if(/(tablet|tabs?|capsule|caps?|syrup|suspension|sachet|ampoule|injection|ointment|nebuli|drops|suppositor)/.test(t))return 'med';
  if(/\b\d+\s?(mg|mcg|iu)\b/.test(t))return 'med';
  return 'supply';
}
// The patient's actual scheduled medications — these ALWAYS belong in the Medications section.
let _schedTokens=null;
function schedMedTokens(){
  if(_schedTokens)return _schedTokens;
  const set=new Set();
  try{SCHED.forEach(s=>s.items.forEach(it=>{if(it.cat==='care')return;[it.med,it.com].forEach(n=>{if(n){const t=normName(n);if(t.length>=4)set.add(t);}});}));}catch(e){}
  _schedTokens=[...set];return _schedTokens;
}
function isKnownPatientMed(name){const sn=normName(name);if(sn.length<4)return false;return schedMedTokens().some(t=>t.includes(sn)||sn.includes(t));}

function filterSupplies(){

function pickImg(inp){
  const f=inp.files&&inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=1200;let w=img.width,h=img.height;
      if(w>max||h>max){const sc=Math.min(max/w,max/h);w=Math.round(w*sc);h=Math.round(h*sc);}
      const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      pendingImg=c.toDataURL('image/jpeg',0.7);
      document.getElementById('attachWrap').innerHTML=`<div class="attach-prev"><img src="${pendingImg}"><button class="attach-x" onclick="clearImg()">✕</button></div>`;
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);
}

function dayData(date){
  if(date===TODAY)return {medsDone:ST.medsDone,supp:ST.suppLog,acts:ST.actionLog,vitals:ST.vitals,sessions:ST.sessions};
  let medsDone={},supp=[],acts=[],vitals=[],sessions=[];

// ---- Web Push subscription (background notifications, works when the app is closed) ----
function urlB64ToUint8(b64){
  const pad='='.repeat((4-b64.length%4)%4);
  const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(s);const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);
  return out;
}
async function subscribePush(){
  try{
    if(!sb||!currentUser||!('serviceWorker'in navigator)||!('PushManager'in window))return;
    if(Notification.permission!=='granted')return;
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)});
    const j=sub.toJSON();
    await sb.from('push_subscriptions').upsert({endpoint:j.endpoint,p256dh:j.keys.p256dh,auth:j.keys.auth,email:currentUser.email,lang:ST.lang,client_id:SID,updated_at:new Date().toISOString()},{onConflict:'endpoint'}).then(()=>{},()=>{});
  }catch(e){}
}
function toggleNotif(){
  if(!('Notification'in window)){toast(L('الإشعارات غير مدعومة على هذا الجهاز','Notifications not supported'),'err');return;}
  if(Notification.permission==='granted'){
    notifOn=!notifOn;localStorage.setItem('notif',notifOn?'1':'0');
    if(notifOn){startNotifLoop();subscribePush();}updateNotifBtn();
    toast(notifOn?L('تم تفعيل الإشعارات','Notifications on'):L('تم إيقاف الإشعارات','Notifications off'),'ok');
  }else{
    Notification.requestPermission().then(pm=>{
      if(pm==='granted'){notifOn=true;localStorage.setItem('notif','1');startNotifLoop();subscribePush();updateNotifBtn();toast(L('تم تفعيل الإشعارات','Notifications on'),'ok');}
      else toast(L('تم رفض إذن الإشعارات','Permission denied'),'err');
    });
  }
}
let notifTimer=null;
function startNotifLoop(){if(notifTimer)return;checkNotifs();notifTimer=setInterval(checkNotifs,30000);}
function checkNotifs(){
  if(!notifOn||!('Notification'in window)||Notification.permission!=='granted')return;
  const n=curMin();
  getSlots().forEach(s=>{
    if(slotAllDone(s))return;
    const d=hm2min(s.t)-n,lbl=slotDesc(s); // describes meds and/or reposition due at this slot
    if(d===15)fire(`m${s.t}15`,L(`تذكير: ${lbl} بعد 15 دقيقة`,`${lbl} reminder — in 15 min`),`${to12(s.t)}`);
    if(d===0)fire(`m${s.t}0`,L(`موعد ${lbl} الآن`,`${lbl} due now`),`${to12(s.t)}`);
  });
  ST.sessions.forEach(s=>{
    if(s.steps.every(Boolean))return;
    if(!s.steps[0]){ // feed not started yet → remind at the feed time
      const d=(s.h*60+s.m)-n;
      if(d===15)fire(`f${s.n}15`,L('تذكير: تغذية بعد 15 دقيقة','Reminder: feed in 15 min'),`${L('الجلسة','Session')} ${s.n} — ${to12(s.t)}`);
      if(d===0)fire(`f${s.n}0`,L('موعد التغذية الآن','Feeding time now'),`${L('الجلسة','Session')} ${s.n}`);
    }
    if(!s.steps[3]){ // water not given yet → remind at the water time (feed + 2h)
      const wd=waterMin(s)-n;
      if(wd===15)fire(`w${s.n}15`,L('تذكير: ماء بعد 15 دقيقة','Reminder: water in 15 min'),`${L('الجلسة','Session')} ${s.n} — ${to12(waterTime(s))}`);
      if(wd===0)fire(`w${s.n}0`,L('موعد الماء الآن','Water time now'),`${L('الجلسة','Session')} ${s.n} — 200 ml`);
    }
  });
  // Vital-signs reminders (3×/day) — only nudge for a check that isn't done yet
  VITALS_TIMES.forEach((t,i)=>{
    if(vitalsSlotStatus(i)==='done')return;
    const d=hm2min(t)-n;
    if(d===15)fire(`v${t}15`,L('تذكير: قياس المؤشرات بعد 15 دقيقة','Reminder: vitals in 15 min'),`${to12(t)}`);
    if(d===0)fire(`v${t}0`,L('موعد قياس المؤشرات الآن','Vitals check due now'),`${to12(t)}`);
  });
  // Date-based reminders: notify 2 days before and on the day (once per day)
  reminderList().forEach(r=>{
    const dd=daysUntil(r.date);
    if(dd===2)fire(`rem${r.key}2_${TODAY}`,L('تذكير: بعد يومين','Reminder: in 2 days'),tx(r.label));
    if(dd===0)fire(`rem${r.key}0_${TODAY}`,L('تذكير اليوم','Reminder today'),tx(r.label));
  });
}

async function syncDown(){
  if(!sb)return;
  try{
    // shared live state (meds checkmarks, feeding steps, notes, supplies, ...)
    const{data:st}=await sb.from('app_state').select('k,v');
    if(st&&st.length)st.forEach(row=>applyRemoteState(row.k,row.v));
    ST.sh=parseInt(localStorage.getItem('sh')||'6');ST.sm=parseInt(localStorage.getItem('sm')||'0');
    // activity log (server-authoritative for today)
    const{data:al}=await sb.from('action_log').select('*').eq('log_date',TODAY).order('logged_at');
    if(al&&al.length){
      const acts=al.map(a=>({id:a.id,at:a.logged_at,type:a.action_type,detail:a.action_detail}));
      _lsSet(`acts_${TODAY}`,JSON.stringify(acts));
    }
    const{data:vt}=await sb.from('vitals').select('*').eq('log_date',TODAY).order('recorded_at');
    if(vt&&vt.length){
      const vits=vt.map(v=>({id:String(v.id),at:v.recorded_at,temp:v.temp,sys:v.systolic,dia:v.diastolic,pulse:v.pulse,rr:v.resp_rate,spo2:v.spo2,glucose:v.glucose,urine:v.urine,stool:v.stool,urineNote:v.urine_note,stoolNote:v.stool_note}));
      _lsSet(`vitals_${TODAY}`,JSON.stringify(vits));
    }
    loadData();ST.sessions=buildSessions();
    render();
  }catch(err){}
}

  body+=`</tbody></table>
    <h2>${L('عند اللزوم (PRN)','As needed (PRN)')}</h2>
    <table><tbody><tr><td>Bisacodyl 10 mg</td><td>${L('لبوس — فقط عند مرور 48 ساعة دون تبرّز','Suppository — only if no BM for 48h')}</td><td style="text-align:center;width:46px"><span class="box"></span></td></tr></tbody></table>`;
  const medsCss=`
    table{margin-top:9px}
    th{padding:10px 11px;font-size:11px}
    td{padding:10px 11px;font-size:11.5px;line-height:1.5}
    .box{width:18px;height:18px}
    h2{margin-top:18px}
  `;
  printWindow(L('جدول الأدوية','Medication Schedule'),body,medsCss);
}
function printFeedSheet(){
  let body=`<h1>${L('جدول التغذية اليومي','Daily Feeding Schedule')}</h1>
    <div class="meta">${esc(tx(PATIENT.name))} · QID ${esc(PATIENT.qid)} · ${fmtDate()}</div>
    <p style="font-size:11px;color:#657085">${L('علّم في المربع بعد كل خطوة. أثناء التغذية أجلس المريض بزاوية 40–45°. الإرواء (Flush) بعد التغذية إلزامي.','Tick each step. Seat the patient at 40–45° during feeding. Flush after feed is mandatory.')}</p>
    <table><thead><tr><th style="width:120px">${L('الجلسة','Session')}</th>${STEP_DEF.map((d,i)=>`<th style="text-align:center">${i+1}. ${tx(d.t)}</th>`).join('')}</tr></thead><tbody>`;
  ST.sessions.forEach(s=>{
    body+=`<tr><td><strong>${L('جلسة','Session')} ${s.n}</strong><br><span style="color:#657085;font-size:11px">${to12(s.t)}</span></td>${STEP_DEF.map(()=>`<td style="text-align:center"><span class="box"></span></td>`).join('')}</tr>`;
  });
  body+=`</tbody></table>
    <p style="font-size:11px;color:#657085;margin-top:10px">${L('إجمالي اليوم: 6 جلسات · 900 مل تغذية · 1200 مل ماء','Daily total: 6 sessions · 900 ml feed · 1200 ml water')}</p>`;
  const feedCss=`
    @page{size:A4 landscape;margin:1cm}
    th{padding:10px 11px;font-size:11.5px}
    td{padding:12px 11px;font-size:12px;line-height:1.5}
    .box{width:20px;height:20px}
  `;
  printWindow(L('جدول التغذية','Feeding Schedule'),body,feedCss);
}
function printReportFor(date){
  const d=loadDay(date);
  const foodMl=d.sessions.filter(s=>s.steps&&s.steps[0]).length*150,waterMl=d.sessions.filter(s=>s.steps&&s.steps[3]).length*200;
  const vitals=(d.vitals||[]).slice().sort((a,b)=>a.at.localeCompare(b.at));
  const items=adminItems();const givenCount=items.filter(it=>d.medsDone[it.id]).length;
  const dayNotes=ST.notes.filter(n=>n.date===date).sort((a,b)=>a.at.localeCompare(b.at));
  const stTxt={given:'✓ Given',missed:'✕ Missed',pending:'• Pending'};
  const w=window.open('','_blank');if(!w)return;
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Care Report ${date}</title>
  <style>body{font-family:Arial,sans-serif;padding:22px;color:#131820;font-size:13px}
  h1{font-size:18px;margin-bottom:2px}h2{font-size:13px;margin:18px 0 7px;border-bottom:2px solid #2b5aa0;padding-bottom:4px;color:#1e3f70}
  .meta{color:#657085;font-size:11px;margin-bottom:6px}
  table{width:100%;border-collapse:collapse;margin-top:4px}th{background:#2b5aa0;color:#fff;padding:6px 9px;text-align:left;font-size:11px}
  td{padding:6px 9px;border-bottom:1px solid #e4e7ec;font-size:12px}
  .g{color:#1a7a48;font-weight:700}.r{color:#b12a1e;font-weight:700}.p{color:#657085}
  .rowmiss{background:#fdf1f0}
  .tot{display:flex;gap:20px;margin:8px 0;font-weight:700}.tot span{color:#2b5aa0}
  @media print{@page{margin:1.2cm}}</style></head><body>
  <h1>Daily Care Report</h1>
  <div class="meta"><strong>${esc(tx(PATIENT.name))}</strong> &nbsp;·&nbsp; QID ${esc(PATIENT.qid)} &nbsp;·&nbsp; HC ${esc(PATIENT.hc)}</div>
  <div class="meta">${fmtDateOf(date)} &nbsp;·&nbsp; printed ${new Date().toLocaleString()}</div>

  <h2>1 · Vital Signs</h2>
  ${vitals.length?`<table><thead><tr><th>Time</th><th>Temp °C</th><th>BP</th><th>Pulse</th><th>RR</th><th>SpO₂</th><th>Glucose</th><th>Urine</th><th>Stool</th></tr></thead>
  <tbody>${vitals.map(v=>`<tr><td>${ft(v.at)}</td><td>${v.temp??'—'}</td><td>${(v.sys!=null||v.dia!=null)?(v.sys??'—')+'/'+(v.dia??'—'):'—'}</td><td>${v.pulse??'—'}</td><td>${v.rr??'—'}</td><td>${v.spo2??'—'}</td><td>${v.glucose??'—'}</td><td class="${v.urine==='abnormal'?'r':''}">${v.urine?({none:'None',normal:'Normal',abnormal:'Abnormal'}[v.urine])+(v.urineNote?` (${esc(v.urineNote)})`:''):'—'}</td><td class="${v.stool==='abnormal'?'r':''}">${v.stool?({none:'None',normal:'Normal',abnormal:'Abnormal'}[v.stool])+(v.stoolNote?` (${esc(v.stoolNote)})`:''):'—'}</td></tr>`).join('')}</tbody></table>`:'<p class="p">No vitals recorded.</p>'}

  <h2>2 · Feeding Intake</h2>
  <div class="tot">Food: <span>${foodMl} / 900 ml</span> &nbsp; Water: <span>${waterMl} / 1200 ml</span></div>
  <table><thead><tr><th>Session</th><th>Feed (150ml)</th><th>Water (200ml)</th></tr></thead>
  <tbody>${d.sessions.map((s,i)=>`<tr><td>Session ${i+1}</td><td class="${s.steps&&s.steps[0]?'g':'p'}">${s.steps&&s.steps[0]?'✓ '+(s.times&&s.times[0]?ft(s.times[0]):''):'—'}</td><td class="${s.steps&&s.steps[3]?'g':'p'}">${s.steps&&s.steps[3]?'✓ '+(s.times&&s.times[3]?ft(s.times[3]):''):'—'}</td></tr>`).join('')}</tbody></table>

  <h2>3 · Medications &nbsp;<span style="font-size:11px;color:#657085">(${givenCount}/${items.length} given)</span></h2>
  <table><thead><tr><th>Time</th><th>Medication</th><th>Route</th><th>Status</th></tr></thead>
  <tbody>${items.map(it=>{const st=medStatus(it.slot,d.medsDone[it.id],date);return `<tr class="${st==='missed'?'rowmiss':''}"><td>${to12(it.slot)}</td><td>${esc(it.med+(it.com?` (${it.com})`:''))}</td><td>${it.route||'—'}</td><td class="${st==='given'?'g':st==='missed'?'r':'p'}">${stTxt[st]}</td></tr>`;}).join('')}</tbody></table>

  <h2>4 · Notes</h2>
  ${dayNotes.length?`<table><thead><tr><th>Time</th><th>Note</th></tr></thead><tbody>${dayNotes.map(n=>`<tr><td>${ft(n.at)}</td><td>${n.text?esc(n.text):''}${n.img?' [photo]':''}</td></tr>`).join('')}</tbody></table>`:'<p class="p">No notes.</p>'}

  <h2>5 · Supplies — Remaining</h2>
  ${ST.supplies.length?`<table><thead><tr><th>Item</th><th>Remaining</th><th>Total</th></tr></thead><tbody>${ST.supplies.map(s=>`<tr><td>${esc(s.name)}</td><td class="${supRem(s)<=2?'r':''}">${supRem(s)}</td><td>${s.stock||0}</td></tr>`).join('')}</tbody></table>`:'<p class="p">No items.</p>'}
  </body></html>`);
  w.document.close();setTimeout(()=>w.print(),400);
}

// ============ HELPERS ============
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let tt;
function toast(msg,type=''){const e=document.getElementById('toast');e.textContent=msg;e.className=`toast vis ${type}`;clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('vis'),2600);}
let _int=null;
function inNote(title,body){
  const c=document.getElementById('inNote');if(!c)return;
  document.getElementById('inNoteT').textContent=title;
  document.getElementById('inNoteB').textContent=body||'';
  c.classList.add('vis');clearTimeout(_int);_int=setTimeout(()=>c.classList.remove('vis'),4200);
}

// ---- Professional confirm / prompt dialogs ----
let _uiRes=null,_uiMode='confirm';
function _uiDone(ok){
  const m=document.getElementById('uiModal');m.classList.remove('op');
  const r=_uiRes;_uiRes=null;if(!r)return;
  if(_uiMode==='prompt')r(ok?document.getElementById('uiInput').value:null);else r(!!ok);
}
function uiConfirm(msg,opt){opt=opt||{};return new Promise(res=>{
  _uiRes=res;_uiMode='confirm';
  document.getElementById('uiTitle').textContent=opt.title||L('تأكيد','Confirm');
  document.getElementById('uiMsg').textContent=msg;
  document.getElementById('uiInputWrap').style.display='none';
  const ok=document.getElementById('uiOk');ok.textContent=opt.ok||L('تأكيد','Confirm');ok.className='btn '+(opt.danger?'btn-d':'btn-p');
  document.getElementById('uiCancel').textContent=opt.cancel||L('إلغاء','Cancel');
  document.getElementById('uiModal').classList.add('op');
});}
function uiPrompt(msg,opt){opt=opt||{};return new Promise(res=>{
  _uiRes=res;_uiMode='prompt';
  document.getElementById('uiTitle').textContent=opt.title||L('إدخال','Enter');
  document.getElementById('uiMsg').textContent=msg;
  const w=document.getElementById('uiInputWrap');w.style.display='block';
  const i=document.getElementById('uiInput');i.type=opt.password?'password':(opt.number?'number':'text');i.value=opt.value!=null?opt.value:'';
  const ok=document.getElementById('uiOk');ok.textContent=opt.ok||L('حفظ','Save');ok.className='btn btn-p';
  document.getElementById('uiCancel').textContent=L('إلغاء','Cancel');
  document.getElementById('uiModal').classList.add('op');
  setTimeout(()=>{i.focus();i.select&&i.select();},60);
});}

// ---- Notify other users/sessions on any log ----
let _bc=null;try{_bc=new BroadcastChannel('care-log');_bc.onmessage=e=>{if(e&&e.data&&e.data.detail)notifyOthers(e.data.detail);};}catch(e){}
function notifyOthers(detail){
  inNote(L('تسجيل جديد','New entry'),detail);
  if(notifOn&&'Notification'in window&&Notification.permission==='granted'){try{new Notification(L('تسجيل جديد في رعاية المريض','New Patient Care entry'),{body:detail,tag:'carelog',icon:'/icon-192.png',badge:'/badge-96.png'});}catch(e){}}
}

document.addEventListener('DOMContentLoaded',init);
</script>
